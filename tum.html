<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টুম টুম টেডাউ - আলটিমেট ভাইব</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.1s;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 4.5rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 15px #ff00ff;
            transition: all 0.1s;
        }

        /* মিউজিক বিটের সাথে এই এনিমেশন চলবে */
        .vibrate {
            animation: shake 0.15s infinite;
        }

        @keyframes shake {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(5deg); filter: hue-rotate(180deg); }
            100% { transform: scale(1) rotate(-5deg); }
        }

        .btn-play {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 1.8rem;
            background: #ff4757;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 20px #ff4757;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-play:hover {
            transform: scale(1.1);
            background: #2ed573;
            box-shadow: 0 0 25px #2ed573;
        }

        .emoji-blast {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="mainTitle">টুম টুম <br> টেডাউ! 😎</h1>
        <button class="btn-play" id="playBtn" onclick="startTheShow()">এনার্জি শুরু করো! 🔥</button>
    </div>

    <audio id="vibeMusic">
        <source src="TUM TUM TERAU SOUND EFFECT(360P).mp4" type="video/mp4">
        </audio>

    <script>
        function startTheShow() {
            const music = document.getElementById('vibeMusic');
            const title = document.getElementById('mainTitle');
            const btn = document.getElementById('playBtn');
            const body = document.body;

            // মিউজিক প্লে
            music.play();
            
            // বাটন লুকিয়ে ফেলা
            btn.style.display = 'none';
            
            // বিটের সাথে স্ক্রিন কাঁপানো
            title.classList.add('vibrate');

            // মিউজিক বাজার সময় রঙ বদলানো
            setInterval(() => {
                const colors = ['#ff0055', '#00ffcc', '#ffcc00', '#6600ff', '#000'];
                body.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // স্ক্রিনে ইমোজি ছড়ানো
                createEmoji();
            }, 150);
        }

        function createEmoji() {
            const emojiList = ['😂', '🙃', '🔥', '💥', '🕺', '🎵'];
            const emoji = document.createElement('div');
            emoji.className = 'emoji-blast';
            emoji.innerText = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.top = Math.random() * 100 + 'vh';
            
            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.remove();
            }, 500);
        }
    </script>

</body>
</html>
